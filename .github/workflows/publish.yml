name: Publish Flatpak Repository

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "23 3 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-25.08
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: scripts/import_gpg_key.sh

      - name: Build Flatpak repository
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ORBIT_GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          ORBIT_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: scripts/build_pages.sh

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
